<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripBlock Operator Dashboard</title>
  <!-- Google Fonts & Tailwind -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'light-bg': '#F4F6F9',
            'surface-card': '#FFFFFF',
            'card-border': '#E2E8F0',
            'brand-green': '#2E7D32', // Softer, fresh agricultural green
            'brand-green-hover': '#1B5E20', // Deep green for hover/contrast
            'brand-green-light': '#E8F5E9', // Very soft light green background highlights
            'accent-green': '#4CAF50', // Vibrant green
            'text-primary': '#1E293B', // Slate 800 for clean text
            'text-secondary': '#475569', // Slate 600
            'text-muted': '#64748B', // Slate 500
            'warning-orange': '#D97706', // Warm amber
            'warning-orange-light': '#FEF3C7',
            'danger-red': '#DC2626', // Clean red
            'danger-red-light': '#FEE2E2',
            'success-green': '#16A34A', // Success badge green
            'success-green-light': '#DCFCE7',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #F4F6F9; color: #1E293B; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #F4F6F9; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #2E7D32; }
    .waveform-bar { animation: bounceWave 1.2s ease-in-out infinite alternate; }
    @keyframes bounceWave { from { height: 4px; } to { height: 28px; } }
    .typing-dot { animation: blinkDot 1.4s infinite both; }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blinkDot { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    @keyframes sonar { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }
    .animate-sonar { animation: sonar 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slideIn { animation: slideIn 0.3s ease-out forwards; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="font-sans antialiased text-text-primary select-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const INITIAL_REQUESTS = [
      { id: "REQ-201", name: "Ganesh", village: "Sanchi", service: "Water Tanker • 5000L", icon: "tanker", time: "2 minutes ago", status: "Pending" },
      { id: "REQ-202", name: "Amara", village: "Mandla", service: "Tractor Rental • Harvesting", icon: "tractor", time: "12 minutes ago", status: "Grouped" },
      { id: "REQ-203", name: "Kavi", village: "Bilaspur", service: "Fertilizer • 20 Bags", icon: "seed", time: "16 minutes ago", status: "Pending" },
      { id: "REQ-204", name: "Raj", village: "Sehore", service: "Cold Storage • 2 Tons", icon: "transport", time: "45 minutes ago", status: "Completed" },
      { id: "REQ-205", name: "Suresh", village: "Sehore", service: "Tractor Repair • Engine", icon: "mechanic", time: "1 hour ago", status: "Pending" },
      { id: "REQ-206", name: "Hari", village: "Mandla", service: "Crop Transport • 5 Tons", icon: "transport", time: "2 hours ago", status: "Grouped" }
    ];

    const INITIAL_BLOCKS = [
      { 
        id: "TB-0941", 
        service: "Water Tanker", 
        icon: "tanker", 
        status: "live", 
        farmers: "12 Farmers", 
        saved: "₹9,400", 
        provider: "Rural Logistics Ltd", 
        villages: ["Sanchi", "Rahatgarh"], 
        costSplit: { total: 4800, split: 400 },
        rules: ["Locality grouping within 5km radius", "Optimal tanker load balancing", "Shared mileage split discount"]
      },
      { 
        id: "TB-0942", 
        service: "Fertilizer Delivery", 
        icon: "seed", 
        status: "matching", 
        farmers: "8 Farmers", 
        saved: "₹3,200", 
        provider: "Unassigned", 
        villages: ["Bilaspur", "Sehore"], 
        costSplit: { total: 3200, split: 400 },
        rules: ["Cooperative purchasing discounts", "Dropoff point clustering", "Co-loaded logistics reduction"]
      },
      { 
        id: "TB-0943", 
        service: "Tractor Rental", 
        icon: "tractor", 
        status: "live", 
        farmers: "5 Farmers", 
        saved: "₹12,000", 
        provider: "Sardar Machinery", 
        villages: ["Mandla", "Sehore"], 
        costSplit: { total: 5000, split: 1000 },
        rules: ["Multi-acre sequential field mapping", "Fuel conservation routing", "Shared operator dispatch"]
      }
    ];

    const PROVIDERS = {
      "TB-0941": [
        { name: "Rural Logistics Ltd", rating: 4.8, reviews: 142, dist: "1.8 km", availability: "Available Now", score: 98 },
        { name: "Bhopal Agri Transport", rating: 4.4, reviews: 68, dist: "3.5 km", availability: "In 30 mins", score: 85 }
      ],
      "TB-0942": [
        { name: "AgriTrans Co.", rating: 4.9, reviews: 124, dist: "4.2 km", availability: "Available Now", score: 98 },
        { name: "Express Haulers", rating: 4.7, reviews: 89, dist: "8.6 km", availability: "In 10 mins", score: 92 },
        { name: "Bharat Logistics", rating: 4.5, reviews: 210, dist: "12.0 km", availability: "Available Now", score: 86 }
      ],
      "TB-0943": [
        { name: "Sardar Machinery", rating: 4.8, reviews: 95, dist: "2.4 km", availability: "Available Now", score: 96 },
        { name: "Malwa Rentals", rating: 4.3, reviews: 45, dist: "6.1 km", availability: "In 1 hour", score: 79 }
      ]
    };

    const INITIAL_LOGS = [
      { time: "11:14 AM", type: "save", text: "₹3,200 saved — TB-0942 completed grouping", tag: "TB-0942" },
      { time: "11:12 AM", type: "assign", text: "Provider \"Sardar Machinery\" matched to TB-0943", tag: "TB-0943" },
      { time: "11:10 AM", type: "group", text: "TB-0941 created — 12 farmers grouped", tag: "Sanchi" }
    ];

    function CountUp({ target, prefix = "" }) {
      const [count, setCount] = useState(0);
      useEffect(() => {
        let current = 0;
        const step = Math.ceil(target / 25) || 1;
        const timer = setInterval(() => {
          current += step;
          if (current >= target) {
            setCount(target);
            clearInterval(timer);
          } else {
            setCount(current);
          }
        }, 25);
        return () => clearInterval(timer);
      }, [target]);
      return <span>{prefix}{count.toLocaleString()}</span>;
    }

    function App() {
      const [activeView, setActiveView] = useState("dashboard");
      const [isSidebarExpanded, setIsSidebarExpanded] = useState(true);
      const [requests, setRequests] = useState(INITIAL_REQUESTS);
      const [tripBlocks, setTripBlocks] = useState(INITIAL_BLOCKS);
      const [logs, setLogs] = useState(INITIAL_LOGS);
      const [selectedBlock, setSelectedBlock] = useState(INITIAL_BLOCKS[1]);
      const [approvedProviders, setApprovedProviders] = useState({});
      const [currentTime, setCurrentTime] = useState("");
      const [searchQuery, setSearchQuery] = useState("");
      const [alertMsg, setAlertMsg] = useState(null);
      
      const [pipelineStep, setPipelineStep] = useState(1);
      const [groupingPulse, setGroupingPulse] = useState(false);
      const [liveScroll, setLiveScroll] = useState(true);

      const [chatMessages, setChatMessages] = useState([]);
      const [chatTyping, setChatTyping] = useState(false);
      const [jsonIndex, setJsonIndex] = useState(0);
      const [sttActive, setSttActive] = useState(false);

      useEffect(() => {
        const t = setInterval(() => {
          setCurrentTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
        }, 1000);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        const sim = setInterval(() => {
          setPipelineStep(p => {
            const next = (p + 1) % 5;
            if (next === 2) {
              setGroupingPulse(true);
              setTimeout(() => setGroupingPulse(false), 2500);
            }
            return next;
          });

          if (liveScroll) {
            const firstNames = ["Kamlesh", "Sunita", "Rajesh", "Narmada", "Ramesh", "Preeti"];
            const villages = ["Sanchi", "Mandla", "Bilaspur", "Sehore", "Rahatgarh"];
            const services = [
              { label: "Water Tanker • 4000L", icon: "tanker" },
              { label: "Tractor Rental • Sowing", icon: "tractor" },
              { label: "Harvester Mechanic", icon: "mechanic" },
              { label: "Crop Transport • 3 Tons", icon: "transport" },
              { label: "Fertilizer • 15 Bags", icon: "seed" }
            ];

            const randomName = firstNames[Math.floor(Math.random() * firstNames.length)];
            const randomVillage = villages[Math.floor(Math.random() * villages.length)];
            const randomService = services[Math.floor(Math.random() * services.length)];

            const newReq = {
              id: `REQ-${Math.floor(Math.random() * 100) + 220}`,
              name: randomName,
              village: randomVillage,
              service: randomService.label,
              icon: randomService.icon,
              time: "Just now",
              status: "Pending"
            };

            setRequests(prev => [newReq, ...prev.slice(0, 5)]);

            setLogs(prev => [
              {
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                type: "ai",
                text: `AI Processed request from ${randomName} (${randomVillage}) for ${randomService.label.split(' • ')[0]}`,
                tag: "AI"
              },
              ...prev.slice(0, 8)
            ]);
          }
        }, 9000);
        return () => clearInterval(sim);
      }, [liveScroll]);

      const triggerChat = () => {
        setChatMessages([]);
        setJsonIndex(0);
        setSttActive(false);
        const sequence = [
          { sender: "farmer", text: "राम राम साहब, कल सुबह 7 बजे 3 एकड़ खेत की जुताई के लिए ट्रैक्टर चाहिए।" },
          { sender: "ai", text: "राम राम! आपकी ट्रैक्टर की बुकिंग दर्ज की जा रही है। क्या आप Rahatgarh विलेज से बोल रहे हैं?" },
          { sender: "farmer", text: "हाँ भैया, राहतगढ़ से ही।" },
          { sender: "ai", text: "ठीक है! विवरण: ट्रैक्टर रेंटल, 3 एकड़ क्षेत्र, समय: सुबह 7:00 बजे, स्थान: राहतगढ़।" },
          { sender: "farmer", text: "हाँ, सब ठीक है।" },
          { sender: "ai", text: "✅ बुकिंग सफल! आपकी रिक्वेस्ट को TB-0942 (Fertilizer & Tractor Block) के साथ ग्रुप कर दिया गया है जिससे आपकी ₹1,500 की बचत होगी।" }
        ];

        let idx = 0;
        const sendNextMessage = () => {
          if (idx < sequence.length) {
            setChatTyping(true);
            setTimeout(() => {
              setChatMessages(prev => [...prev, sequence[idx]]);
              setChatTyping(false);
              idx++;
              if (idx === 1) setSttActive(true);
              if (idx < sequence.length) {
                setTimeout(sendNextMessage, 1500);
              } else {
                triggerNluJson();
              }
            }, 1000);
          }
        };
        sendNextMessage();
      };

      const triggerNluJson = () => {
        let idx = 0;
        const targetJson = JSON.stringify({
          service: "tractor_rental",
          land_area: "3 acres",
          requested_time: "07:00 AM",
          location: "Village Rahatgarh",
          language: "Hindi (Voice)",
          confidence: "98.5%",
          savings_estimate: "₹1,500"
        }, null, 2);

        const interval = setInterval(() => {
          idx += 4;
          if (idx >= targetJson.length) {
            setJsonIndex(targetJson.length);
            clearInterval(interval);
          } else {
            setJsonIndex(idx);
          }
        }, 15);
      };

      useEffect(() => {
        if (activeView === "processing") triggerChat();
      }, [activeView]);

      const handleApprove = (blockId, providerName) => {
        setApprovedProviders(prev => ({ ...prev, [blockId]: providerName }));
        setTripBlocks(prev => prev.map(b => b.id === blockId ? { ...b, status: "live", provider: providerName } : b));
        
        setAlertMsg(`Provider "${providerName}" has been successfully assigned to Block ${blockId}!`);
        setTimeout(() => setAlertMsg(null), 4000);

        setLogs(prev => [
          {
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            type: "assign",
            text: `Manual Dispatch: "${providerName}" assigned to active Block ${blockId}`,
            tag: blockId
          },
          ...prev
        ]);
      };

      const drawIcon = (icon, className = "w-5 h-5") => {
        const paths = {
          dashboard: "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6",
          processing: "M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z",
          tripblocks: "M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10",
          matching: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4",
          insights: "M9 19v-6a2 2 0 00-2-2H5m14 0h-2a2 2 0 00-2 2v6m-4 0h-2v-4a2 2 0 00-2-2H9m12 0h.01M3 21h18M10 3h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V4a1 1 0 011-1z",
          livefeed: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z",
          tractor: "M3 17a3 3 0 1 0 6 0M15 17a4 4 0 1 0 8 0M7 17h8M12 17v-4h3M12 9v4M18 13V9a2 2 0 0 0-2-2h-3L9 12",
          tanker: "M2 6h12v10H2zm12 2h6l3 3v5h-9zm-10 10a2 2 0 1 0 4 0a2 2 0 1 0-4 0zm12 0a2 2 0 1 0 4 0a2 2 0 1 0-4 0z",
          mechanic: "M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z",
          transport: "M1 3h15v13H1zM16 8h4l3 3v5h-7",
          seed: "M12 2a15 15 0 0 0-9 9c0 4.5 3.5 8 8 8a2 2 0 0 0 2-2V2z"
        };
        return (
          <svg className={`${className} stroke-current fill-none`} viewBox="0 0 24 24" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d={paths[icon] || "M12 2v20M2 12h20"} />
          </svg>
        );
      };

      const filteredRequests = requests.filter(r => 
        r.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
        r.village.toLowerCase().includes(searchQuery.toLowerCase()) ||
        r.service.toLowerCase().includes(searchQuery.toLowerCase())
      );

      return (
        <div className="flex h-screen overflow-hidden bg-light-bg font-sans text-text-primary">
          
          {/* SIDEBAR NAVIGATION */}
          <aside className={`flex flex-col border-r border-card-border bg-white transition-all duration-300 ${isSidebarExpanded ? 'w-[240px]' : 'w-[72px]'}`}>
            <div className="flex items-center gap-3 p-4 border-b border-card-border h-[64px] bg-white">
              <div className="w-9 h-9 rounded-lg bg-brand-green text-white flex items-center justify-center font-bold text-lg shadow-sm">
                🌾
              </div>
              {isSidebarExpanded && (
                <div className="flex flex-col">
                  <span className="font-display font-bold text-base tracking-tight text-brand-green leading-none">TripBlock</span>
                  <span className="text-[10px] text-text-muted font-bold mt-1 uppercase tracking-wider">Rural Aggregator</span>
                </div>
              )}
            </div>

            <nav className="flex-1 px-3 py-4 space-y-1.5 overflow-y-auto">
              {[
                { id: "dashboard", label: "Dashboard", icon: "dashboard" },
                { id: "processing", label: "Request Processing", icon: "processing" },
                { id: "tripblocks", label: "Trip Blocks", icon: "tripblocks" },
                { id: "matching", label: "Provider Matching", icon: "matching" },
                { id: "insights", label: "Impact & Insights", icon: "insights" },
                { id: "livefeed", label: "Live Feed", icon: "livefeed" }
              ].map(item => {
                const isActive = activeView === item.id;
                return (
                  <button
                    key={item.id}
                    onClick={() => setActiveView(item.id)}
                    className={`flex items-center gap-3.5 w-full px-4 py-3 rounded-lg text-sm font-semibold transition-all ${
                      isActive 
                        ? 'bg-brand-green text-white shadow-sm' 
                        : 'text-text-secondary hover:text-text-primary hover:bg-light-bg'
                    }`}
                  >
                    <div className={isActive ? 'text-white' : 'text-brand-green'}>
                      {drawIcon(item.icon, "w-5 h-5")}
                    </div>
                    {isSidebarExpanded && <span>{item.label}</span>}
                  </button>
                );
              })}
            </nav>

            <div className="p-3 border-t border-card-border bg-white space-y-2.5">
              <button 
                onClick={() => setActiveView("matching")}
                className="w-full bg-brand-green hover:bg-brand-green-hover text-white flex items-center justify-center gap-2 py-3 px-3 rounded-lg text-xs font-bold transition-all shadow-sm"
              >
                {drawIcon("matching", "w-4 h-4 text-white")}
                {isSidebarExpanded && <span>New Dispatch</span>}
              </button>

              <button 
                onClick={() => setIsSidebarExpanded(!isSidebarExpanded)} 
                className="flex items-center gap-3 text-text-muted hover:text-text-primary w-full p-2.5 text-xs font-semibold rounded-lg hover:bg-light-bg transition-colors"
              >
                <svg className={`w-4 h-4 transition-transform ${isSidebarExpanded ? '' : 'rotate-180'}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
                {isSidebarExpanded && <span>Collapse Sidebar</span>}
              </button>
              
              <div className="flex items-center gap-2.5 p-2 bg-light-bg rounded-lg border border-card-border">
                <span className="w-2.5 h-2.5 rounded-full bg-success-green animate-pulse"></span>
                {isSidebarExpanded && (
                  <div className="flex flex-col">
                    <span className="text-[10px] font-mono font-bold text-text-muted uppercase leading-none">Operator Hub</span>
                    <span className="text-xs font-bold text-text-primary mt-0.5">Operator #042</span>
                  </div>
                )}
              </div>
            </div>
          </aside>

          {/* MAIN CONTAINER */}
          <main className="flex-1 flex flex-col overflow-hidden">
            <header className="flex items-center justify-between px-6 py-4 border-b border-card-border bg-white h-[64px] flex-shrink-0">
              <div className="flex items-center gap-3">
                <span className="text-sm font-semibold text-text-secondary font-display">TripBlock Operations Hub</span>
                <span className="px-2 py-0.5 text-[10px] font-bold rounded-full bg-brand-green-light text-brand-green border border-brand-green/10">Active Session</span>
              </div>

              <div className="flex-1 max-w-md mx-8 relative hidden md:block">
                <span className="absolute inset-y-0 left-3.5 flex items-center text-text-muted">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0z" />
                  </svg>
                </span>
                <input 
                  type="text" 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  placeholder="Search farmer name, village, or service..."
                  className="w-full pl-10 pr-4 py-2 rounded-lg bg-light-bg border border-card-border text-xs focus:outline-none focus:ring-1 focus:ring-brand-green focus:bg-white focus:border-brand-green font-medium transition-all" 
                />
              </div>

              <div className="flex items-center gap-4">
                <button className="text-text-muted hover:text-text-primary relative p-2 rounded-lg hover:bg-light-bg transition-colors">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0 1 18 14.158V11a6.002 6.002 0 0 0-4-5.659V5a2 2 0 1 0-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 1 1-6 0v-1m6 0H9" />
                  </svg>
                  <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-danger-red"></span>
                </button>
                <div className="flex items-center gap-2.5 bg-brand-green-light px-3 py-1.5 rounded-full border border-brand-green/10">
                  <span className="w-2 h-2 rounded-full bg-brand-green"></span>
                  <span className="text-xs font-semibold text-brand-green font-mono">Bhopal Hub</span>
                </div>
                <div className="text-sm font-mono font-bold text-text-muted tracking-wide hidden lg:block">
                  {currentTime || "13:30 PM"}
                </div>

                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
